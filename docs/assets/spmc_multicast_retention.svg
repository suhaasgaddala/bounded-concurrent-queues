<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">SPMC retained-history ring</title>
  <desc id="desc">A circular retained-history ring showing one producer, multiple consumer cursors, a retained window, and lag when a cursor falls behind retained history.</desc>
  <defs>
    <marker id="arrow-teal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6d28d9"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, Helvetica, sans-serif; }
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { fill: #0f172a; font-size: 30px; font-weight: 800; }
      .subtitle { fill: #475569; font-size: 15px; font-weight: 500; }
      .label { fill: #0f172a; font-size: 15px; font-weight: 800; }
      .body { fill: #475569; font-size: 13px; font-weight: 500; }
      .small { fill: #64748b; font-size: 12px; font-weight: 700; }
      .ring-base { fill: none; stroke: #d7dee8; stroke-width: 42; stroke-dasharray: 20 9; }
      .ring-retained { fill: none; stroke: #38bdf8; stroke-width: 42; stroke-dasharray: 20 9; stroke-linecap: butt; }
      .ring-write { fill: none; stroke: #f97316; stroke-width: 42; stroke-dasharray: 20 9; stroke-linecap: butt; }
      .ring-lagged { fill: none; stroke: #fecaca; stroke-width: 42; stroke-dasharray: 20 9; stroke-linecap: butt; }
      .arrow-teal { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-violet { stroke: #6d28d9; stroke-width: 3; fill: none; marker-end: url(#arrow-violet); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-red { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrow-red); stroke-linecap: round; stroke-linejoin: round; }
      .pill-blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .pill-orange { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; }
      .pill-violet { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .pill-red { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.5; }
      .center { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="64" y="64">SPMC retained-history ring</text>
  <text class="subtitle" x="64" y="92">One producer publishes an ordered stream; each consumer tracks its own cursor.</text>

  <rect class="card" x="52" y="126" width="936" height="424" rx="24"/>

  <g aria-label="Retained-history ring">
    <circle class="ring-base" cx="520" cy="318" r="142"/>
    <path class="ring-lagged" d="M378 318 A142 142 0 0 1 420 217"/>
    <path class="ring-retained" d="M420 217 A142 142 0 1 1 640 419"/>
    <path class="ring-write" d="M640 419 A142 142 0 0 1 662 318"/>
    <circle class="center" cx="520" cy="318" r="86"/>
    <text class="label" x="486" y="300">retained</text>
    <text class="label" x="464" y="322">message window</text>
    <text class="body" x="458" y="348">reads do not remove</text>
  </g>

  <g aria-label="Producer path">
    <rect class="pill-orange" x="86" y="214" width="226" height="82" rx="18"/>
    <text class="label" x="126" y="247">single producer</text>
    <text class="body" x="126" y="273">claims next write slot</text>
    <path class="arrow-teal" d="M314 255 C360 236 386 222 426 219"/>
  </g>

  <g aria-label="Cursor callouts">
    <rect class="pill-violet" x="740" y="176" width="194" height="52" rx="16"/>
    <text class="label" x="770" y="207">C0 at latest</text>
    <path class="arrow-violet" d="M742 226 C704 262 684 288 665 318"/>

    <rect class="pill-violet" x="746" y="350" width="194" height="52" rx="16"/>
    <text class="label" x="769" y="381">C1 mid-window</text>
    <path class="arrow-violet" d="M746 376 C690 391 661 406 634 419"/>

    <rect class="pill-red" x="86" y="394" width="258" height="64" rx="18"/>
    <text class="label" x="126" y="426">C2 fell behind</text>
    <text class="body" x="126" y="448">older than retained window</text>
    <path class="arrow-red" d="M344 414 C366 386 376 351 379 318"/>
  </g>

  <g aria-label="Legend">
    <rect class="pill-blue" x="154" y="488" width="162" height="32" rx="16"/>
    <text class="small" x="181" y="509">retained window</text>
    <rect class="pill-orange" x="340" y="488" width="166" height="32" rx="16"/>
    <text class="small" x="371" y="509">write in progress</text>
    <rect class="pill-red" x="530" y="488" width="154" height="32" rx="16"/>
    <text class="small" x="558" y="509">lagged cursor</text>
    <rect class="pill-violet" x="708" y="488" width="176" height="32" rx="16"/>
    <text class="small" x="735" y="509">consumer cursors</text>
  </g>
</svg>
