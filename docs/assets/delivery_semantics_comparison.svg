<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Queue delivery accounting</title>
  <desc id="desc">A high-level bar chart showing that work-sharing queues count one exclusive pop per publication, while multicast SPMC can count one observation per consumer.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, Helvetica, sans-serif; }
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { fill: #0f172a; font-size: 30px; font-weight: 800; }
      .subtitle { fill: #475569; font-size: 15px; font-weight: 500; }
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .bar-work { fill: #2563eb; }
      .bar-spmc { fill: #f97316; }
      .bar-unique { fill: #7c3aed; }
      .label { fill: #0f172a; font-size: 15px; font-weight: 800; }
      .body { fill: #475569; font-size: 13px; font-weight: 500; }
      .small { fill: #64748b; font-size: 12px; font-weight: 700; }
      .value { fill: #ffffff; font-size: 20px; font-weight: 900; }
      .note { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; }
      .chip { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1040" height="620"/>
  <text class="title" x="64" y="64">Queue delivery accounting</text>
  <text class="subtitle" x="64" y="92">Same publication count, different delivery units. This is a contract diagram, not a throughput claim.</text>

  <rect class="card" x="56" y="128" width="928" height="424" rx="24"/>

  <g aria-label="Chart area">
    <line class="grid" x1="142" y1="212" x2="720" y2="212"/>
    <line class="grid" x1="142" y1="286" x2="720" y2="286"/>
    <line class="grid" x1="142" y1="360" x2="720" y2="360"/>
    <line class="axis" x1="142" y1="434" x2="720" y2="434"/>
    <line class="axis" x1="142" y1="184" x2="142" y2="434"/>

    <text class="small" x="112" y="438">0</text>
    <text class="small" x="110" y="364">1x</text>
    <text class="small" x="110" y="290">2x</text>
    <text class="small" x="110" y="216">3x</text>
    <text class="small" x="286" y="472">observations per publication</text>

    <rect class="bar-work" x="198" y="360" width="104" height="74" rx="12"/>
    <text class="value" x="236" y="405">1x</text>
    <text class="label" x="178" y="500">work-sharing</text>
    <text class="body" x="178" y="522">one exclusive pop</text>

    <rect class="bar-spmc" x="396" y="212" width="104" height="222" rx="12"/>
    <text class="value" x="434" y="331">3x</text>
    <text class="label" x="384" y="500">multicast SPMC</text>
    <text class="body" x="362" y="522">three consumer observations</text>

    <rect class="bar-unique" x="594" y="360" width="104" height="74" rx="12"/>
    <text class="value" x="632" y="405">1x</text>
    <text class="label" x="590" y="500">unique IDs</text>
    <text class="body" x="568" y="522">same publication count</text>
  </g>

  <g aria-label="Explanation panel">
    <rect class="note" x="760" y="188" width="178" height="196" rx="18"/>
    <text class="label" x="790" y="224">How to read it</text>
    <text class="body" x="790" y="254">Work-sharing queues</text>
    <text class="body" x="790" y="274">remove one item per</text>
    <text class="body" x="790" y="294">successful pop.</text>
    <text class="body" x="790" y="330">SPMC lets each</text>
    <text class="body" x="790" y="350">consumer observe</text>
    <text class="body" x="790" y="370">the same sequence.</text>

    <rect class="chip" x="758" y="414" width="182" height="42" rx="16"/>
    <text class="small" x="786" y="440">separate benchmark fields</text>
    <rect class="chip" x="758" y="466" width="182" height="42" rx="16"/>
    <text class="small" x="789" y="492">not a queue ranking</text>
  </g>
</svg>
